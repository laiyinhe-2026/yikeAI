        <div class="creator-workspace">
          <article class="prompt-card"><h2>填写作品描述</h2><textarea class="prompt-input" rows="9">孩子画了一幅海底世界，颜色丰富，细节认真，但主体稍小，希望点评温和专业。</textarea><div class="prompt-actions"><button class="generate-main" type="button">开始生成</button><button class="ghost-button" type="button">保存模板</button></div></article>
