      <section class="app-content create-page">
        <p class="workbench-eyebrow">招生内容</p>
        <h1>招生内容创作</h1>
        <p>生成海报文案、朋友圈内容、小红书笔记和短视频脚本。</p>
        <div class="creator-workspace">
          <article class="prompt-card">
            <h2>填写招生需求</h2>
            <textarea class="prompt-input" rows="9">暑假创意美术班招生，面向 6-10 岁，突出小班教学、作品展示和主题创作。</textarea>
            <div class="prompt-actions"><button class="generate-main" type="button">开始生成</button><button class="ghost-button" type="button">保存模板</button></div>
          </article>
          <article class="workspace-result">
            <h2>生成结果</h2>
            <div class="workspace-result-body"><p>标题：这个暑假，让孩子把想象画出来。</p><p>朋友圈文案：暑假创意美术班开始预约，小班教学，完成一幅可以展示的主题作品。</p><p>短视频口播：孩子的想象力，需要一个可以被看见的出口。</p></div>
          </article>
        </div>
      </section>
